pip_install_packages:
  - name: docker

redmine_image: redmine:5.1
redmine_port: 80

db_host: "{{ vault_db_host }}"
db_name: "{{ vault_db_name }}"
db_user: "{{ vault_db_user }}"
db_password: "{{ vault_db_password }}"

datadog_checks:
  http_check:
    init_config:

    instances:
      - name: redmine
        url: "http://localhost"
